version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: asset_mgmt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asset_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asset_password}
      POSTGRES_DB: ${POSTGRES_DB:-asset_management}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - asset_mgmt_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-asset_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: asset_mgmt_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - asset_mgmt_network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_password}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: asset_mgmt_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis_password}
    ports:
      - '8081:8081'
    depends_on:
      - redis
    networks:
      - asset_mgmt_network
    profiles:
      - tools

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: asset_mgmt_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@asset.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_password}
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - asset_mgmt_network
    profiles:
      - tools

volumes:
  postgres_data:
    name: asset_mgmt_postgres_data
  redis_data:
    name: asset_mgmt_redis_data

networks:
  asset_mgmt_network:
    name: asset_mgmt_network
    driver: bridge
